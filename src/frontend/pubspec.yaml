name: klangk_frontend
description: Klangk - Web Coding Agent
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.6.0
  flutter: ^3.27.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.0
  xterm: ^4.0.0
  google_fonts: ^8.1.0
  web_socket_channel: ^3.0.0
  http: ^1.2.0
  provider: ^6.1.0
  shared_preferences: ^2.3.0
  desktop_drop: ^0.7.1
  go_router: ^17.2.3
  flutter_markdown_plus: ^1.0.7
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  klangk_plugin_api:
    git:
      url: https://github.com/mcdonc/klangk-plugin-api.git
  # Path set by import_plugins.py — do not edit this line
  klangk_plugins:
    path: PLACEHOLDER

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
