name: Backend Tests

on:
  pull_request:
    paths:
      - "backend/**"
      - "tests/unit/backend/**"
      - "pytest.ini"
      - ".github/workflows/backend-tests.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "tests/unit/backend/**"
      - "pytest.ini"
      - ".github/workflows/backend-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -e backend/

      - name: Run tests
        # -n auto: run tests in parallel across CPUs (pytest-xdist)
        run: python -m pytest tests/unit/backend -v -n auto
