name: Backend Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -e src/backend/

      - name: Run tests
        # -n auto: run tests in parallel across CPUs (pytest-xdist)
        run: python -m pytest src/backend/tests -v -n auto
