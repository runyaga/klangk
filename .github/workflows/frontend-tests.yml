name: Frontend Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/frontend/lib/**"
      - "src/frontend/test/**"
      - "src/frontend/pubspec.yaml"
      - ".github/workflows/frontend-tests.yml"
  push:
    branches: [main]
    paths:
      - "src/frontend/lib/**"
      - "src/frontend/test/**"
      - "src/frontend/pubspec.yaml"
      - ".github/workflows/frontend-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create stub bark_plugins package
        run: bash scripts/stub_dart_plugins.sh

      - name: Install dependencies
        working-directory: src/frontend
        run: flutter pub get

      - name: Run tests with coverage
        working-directory: src/frontend
        run: flutter test --coverage

      - name: Coverage report
        working-directory: src/frontend
        run: python3 ../../scripts/lcov-report.py coverage/lcov.info
