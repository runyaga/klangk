name: Frontend Tests

on:
  pull_request:
    paths:
      - "frontend/lib/**"
      - "frontend/test/**"
      - "frontend/pubspec.yaml"
      - ".github/workflows/frontend-tests.yml"
  push:
    branches: [main]
    paths:
      - "frontend/lib/**"
      - "frontend/test/**"
      - "frontend/pubspec.yaml"
      - ".github/workflows/frontend-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Run tests
        working-directory: frontend
        run: flutter test
