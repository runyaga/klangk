name: E2E Tests

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "15 * * * *"

jobs:
  check:
    # Determine if tests should run. For scheduled triggers, skip
    # if no commits in the last hour. Always run for workflow_dispatch.
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6

      - name: Check for recent commits
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          LAST_COMMIT=$(git log -1 --format=%ct)
          NOW=$(date +%s)
          DIFF=$((NOW - LAST_COMMIT))
          if [ $DIFF -le 3600 ]; then
            echo "Commits found in the last hour"
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "No commits in the last hour, cancelling"
            gh run cancel ${{ github.run_id }}
          fi

  test:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
      OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL }}
      BARK_JWT_SECRET: e2e-test-secret
      BARK_DEFAULT_USER: admin
      BARK_DEFAULT_PASSWORD: admin
      BARK_TEST_MODE: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/determinate-nix-action@main

      - name: Free disk space
        run: |
          set -x
          rm -rf $HOME/.cache
          nohup sudo ionice -c3 nice -n19 rm -rf \
            /usr/share/dotnet /usr/local/lib/android \
            /opt/hostedtoolcache /usr/lib/jvm \
            /usr/share/swift $HOME/.rustup \
            /usr/local/share/chromium \
            /usr/lib/google-cloud-sdk \
            /usr/local/powershell /usr/local/.ghcup \
            /usr/local/julia* &

      - name: Bootstrap
        run: |
          ./bootstrap --unattended --cachix-version v1.11.1

      - name: Prepare bark devenv
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          devenv shell -- true

      - name: Build Docker image and Flutter web
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          devenv tasks run bark:docker-build bark:flutter-build

      - name: Run E2E tests
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          devenv shell -- test-e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          retention-days: 7
          path: |
            src/e2e_tests/test-results/
            src/e2e_tests/logs/
