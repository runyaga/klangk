name: E2E Tests

on:
  workflow_dispatch:
  schedule:
    # Twice daily: 8am and 8pm UTC
    - cron: "0 8,20 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
      OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL }}
      BARK_JWT_SECRET: e2e-test-secret
      BARK_DEFAULT_USER: admin
      BARK_DEFAULT_PASSWORD: admin
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/determinate-nix-action@main

      - name: Free disk space
        run: |
          set -x
          rm -rf $HOME/.cache
          nohup sudo ionice -c3 nice -n19 rm -rf \
            /usr/share/dotnet /usr/local/lib/android \
            /opt/hostedtoolcache /usr/lib/jvm \
            /usr/share/swift $HOME/.rustup \
            /usr/local/share/chromium \
            /usr/lib/google-cloud-sdk \
            /usr/local/powershell /usr/local/.ghcup \
            /usr/local/julia* &

      - name: Create .env
        run: |
          cat > .env << EOF
          OLLAMA_API_KEY=${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_BASE_URL=${{ secrets.OLLAMA_BASE_URL }}
          OLLAMA_MODEL=${{ secrets.OLLAMA_MODEL }}
          BARK_JWT_SECRET=e2e-test-secret
          BARK_DEFAULT_USER=admin
          BARK_DEFAULT_PASSWORD=admin
          EOF

      - name: Install devenv
        run: ./bootstrap --unattended

      - name: Start services and wait for server
        shell: bash
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          # Start devenv in background within this step so the
          # process survives while we poll. Builds (Flutter + Docker)
          # run via execIfModified and can take several minutes.
          devenv up --no-tui > /tmp/devenv-up.log 2>&1 &
          DEVENV_PID=$!
          echo "devenv up started as PID $DEVENV_PID"
          # Poll for up to 10 minutes (builds can be slow on CI)
          for i in $(seq 1 120); do
            if ! kill -0 $DEVENV_PID 2>/dev/null; then
              echo "devenv up exited unexpectedly, logs:"
              cat /tmp/devenv-up.log
              exit 1
            fi
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:8997/ 2>/dev/null || true)
            if [ "$code" = "200" ]; then
              echo "Server ready (attempt $i)"
              exit 0
            fi
            echo "Waiting for server... (attempt $i, status=$code)"
            tail -1 /tmp/devenv-up.log 2>/dev/null || true
            sleep 5
          done
          echo "Server failed to start after 10 minutes, logs:"
          cat /tmp/devenv-up.log
          exit 1

      - name: Install Playwright browsers
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          devenv shell -- bash -c \
            "cd tests/playwright && npm run install-browsers"

      - name: Run E2E tests
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          CHROME=$(which google-chrome-stable 2>/dev/null \
            || which chromium-browser 2>/dev/null \
            || echo /usr/bin/google-chrome-stable)
          devenv shell -- bash -c \
            "cd tests/playwright && \
             CHROME_PATH=$CHROME npx playwright test"

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          path: tests/playwright/test-results/
