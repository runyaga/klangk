name: Flutter E2E Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"

jobs:
  check:
    # Determine if tests should run. For scheduled triggers, skip
    # if no commits in the last hour. Always run for workflow_dispatch.
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6

      - name: Check for recent commits
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LAST_COMMIT=$(git log -1 --format=%ct)
          NOW=$(date +%s)
          DIFF=$((NOW - LAST_COMMIT))
          if [ "$DIFF" -le 3600 ]; then
            echo "Commits found in the last hour"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "No commits in the last hour, cancelling"
            gh run cancel ${{ github.run_id }}
          fi

  test:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      BARK_LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      BARK_LLM_BASE_URL: https://ollama.com/v1
      BARK_LLM_MODEL: gemma4:31b
      BARK_JWT_SECRET: e2e-test-secret
      BARK_DEFAULT_USER: admin@plope.com
      BARK_DEFAULT_PASSWORD: admin
      BARK_TEST_MODE: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/devenv-setup
        with:
          build-tasks: bark:docker-build bark:flutter-build

      - name: Run E2E tests
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          devenv shell -- test-frontend-e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          retention-days: 7
          path: |
            src/frontend/e2e-tests/test-results/
            src/frontend/e2e-tests/logs/
