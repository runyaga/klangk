name: CLI E2E Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  schedule:
    - cron: "45 * * * *"

jobs:
  check:
    # For scheduled triggers, skip if no commits in the last hour.
    # Always run for workflow_dispatch.
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6

      - name: Check for recent commits
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LAST_COMMIT=$(git log -1 --format=%ct)
          NOW=$(date +%s)
          DIFF=$((NOW - LAST_COMMIT))
          if [ "$DIFF" -le 3600 ]; then
            echo "Commits found in the last hour"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "No commits in the last hour, cancelling"
            gh run cancel ${{ github.run_id }}
          fi

  test-cli-e2e:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KLANGK_LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      KLANGK_LLM_BASE_URL: https://ollama.com/v1
      KLANGK_LLM_MODEL: gemma4:31b
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/devenv-setup
        with:
          build-tasks: klangk:docker-build

      - name: Stop devenv services
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          devenv processes down --no-tui 2>/dev/null || true

      - name: Run CLI E2E tests
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          devenv shell -- test-cli-e2e
