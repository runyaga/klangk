name: CLI E2E Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/backend/**"
      - "src/docker/**"
      - ".github/workflows/cli-e2e-tests.yml"
  push:
    branches: [main]
    paths:
      - "src/backend/**"
      - "src/docker/**"
      - ".github/workflows/cli-e2e-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: https://ollama.com/v1
      LLM_MODEL: gemma4:31b
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/determinate-nix-action@main

      - name: Free disk space
        run: |
          set -x
          rm -rf "$HOME/.cache"
          nohup sudo ionice -c3 nice -n19 rm -rf \
            /usr/share/dotnet /usr/local/lib/android \
            /opt/hostedtoolcache /usr/lib/jvm \
            /usr/share/swift "$HOME/.rustup" \
            /usr/local/share/chromium \
            /usr/lib/google-cloud-sdk \
            /usr/local/powershell /usr/local/.ghcup \
            /usr/local/julia* &

      - name: Bootstrap
        run: |
          ./bootstrap --unattended --cachix-version v1.11.1

      - name: Prepare bark devenv
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          devenv shell -- true

      - name: Build Docker image
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          devenv tasks run bark:docker-build

      - name: Run CLI E2E tests
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          devenv shell -- test-cli-e2e
