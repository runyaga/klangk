name: Cleanup Runs

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
          delete_run_by_conclusion_pattern: "skipped,cancelled"
      - name: Cancel this workflow run
        uses: potiuk/cancel-workflow-runs@v4_9
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ github.run_id }}
          reason: "Cleanup completed"
